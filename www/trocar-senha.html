<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DriverFlux - Primeiro Acesso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .icon {
            text-align: center;
            font-size: 56px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .info-box {
            background: #eef2ff;
            border-left: 4px solid #4f46e5;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #1e293b;
            font-weight: 500;
        }

        .info-box span {
            color: #4f46e5;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        input:focus {
            border-color: #4f46e5;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .password-hint {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.97);
            background: #4338ca;
        }

        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            padding: 10px;
            background: #fef2f2;
            border-radius: 10px;
        }

        .success-message {
            color: #10b981;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            padding: 10px;
            background: #ecfdf5;
            border-radius: 10px;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="icon">🔐</div>
        <h1>Primeiro acesso</h1>
        <div class="subtitle">Você precisa criar uma senha permanente</div>

        <div class="info-box" id="infoUsuario">
            <span>🔄</span> Carregando informações...
        </div>

        <div class="input-group">
            <label>Nova senha</label>
            <input type="password" id="novaSenha" placeholder="Digite sua nova senha" autocomplete="new-password">
            <div class="password-hint">Mínimo de 4 caracteres</div>
        </div>

        <div class="input-group">
            <label>Confirmar senha</label>
            <input type="password" id="confirmarSenha" placeholder="Digite novamente sua senha" autocomplete="new-password">
        </div>

        <!-- CAMPO DE CADASTRO DE PONTO (APENAS PARA MASTER) -->
        <div id="campoPonto" style="display: none;">
            <div class="input-group">
                <label>Nome do Ponto (Base/Empresa)</label>
                <input type="text" id="nomePonto" placeholder="Ex: Táxi Central, Ponto da Estação" autocomplete="off">
                <div class="password-hint">Este será o identificador da sua frota</div>
            </div>
        </div>

        <button id="btnSalvar" onclick="trocarSenha()">✅ Salvar e continuar</button>

        <div id="messageArea"></div>
        <div class="footer">DriverFlux - Sistema de Gestão de Táxi</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    // Firebase configuration (mesma do app.js)
    const firebaseConfig = {
        apiKey: "AIzaSyAY217DxZeZZMlg0ZpHYFvXoALrkd5zcPM",
        authDomain: "driverflux.firebaseapp.com",
        databaseURL: "https://driverflux-default-rtdb.firebaseio.com",
        projectId: "driverflux",
        storageBucket: "driverflux.firebasestorage.app",
        messagingSenderId: "855577761510",
        appId: "1:855577761510:web:7e4c0911921a5c18c34d27"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // Get user info from localStorage (set by login)
    const user = localStorage.getItem('driverflux_temp_user');
    const isMaster = localStorage.getItem('driverflux_temp_isMaster') === 'true';

    // Update info box
    const infoBox = document.getElementById('infoUsuario');
    const campoPonto = document.getElementById('campoPonto');
    if (infoBox) {
        if (isMaster) {
            infoBox.innerHTML = '👑 <span>Usuário MASTER</span><br>Defina sua senha permanente e crie seu ponto de táxi.';
            if (campoPonto) campoPonto.style.display = 'block';
            
            // Pré-preenchimento para facilitar testes (Conforme solicitado)
            document.getElementById('novaSenha').value = '1234';
            document.getElementById('confirmarSenha').value = '1234';
            document.getElementById('nomePonto').value = 'Ponto de Teste';
        } else {
            infoBox.innerHTML = '👤 <span>' + (user ? user.toUpperCase() : 'MOTORISTA') + '</span><br>Este é seu primeiro acesso. Crie uma senha permanente.';
        }
    }

    // If no user, redirect back
    if (!user) {
        const msgDiv = document.getElementById('messageArea');
        if (msgDiv) {
            msgDiv.innerHTML = '<div class="error-message">⚠️ Sessão expirada. Faça login novamente.</div>';
        }
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2000);
    }

    async function trocarSenha() {
        const novaSenha = document.getElementById('novaSenha').value;
        const confirmarSenha = document.getElementById('confirmarSenha').value;
        const nomePonto = document.getElementById('nomePonto').value.trim();
        const messageDiv = document.getElementById('messageArea');
        const btn = document.getElementById('btnSalvar');

        // Clear previous messages
        if (messageDiv) messageDiv.innerHTML = '';

        // Validation
        if (novaSenha.length < 4) {
            if (messageDiv) messageDiv.innerHTML = '<div class="error-message">⚠️ A senha deve ter no mínimo 4 caracteres.</div>';
            document.getElementById('novaSenha').focus();
            return;
        }

        if (novaSenha !== confirmarSenha) {
            if (messageDiv) messageDiv.innerHTML = '<div class="error-message">⚠️ As senhas não conferem. Digite novamente.</div>';
            document.getElementById('confirmarSenha').value = '';
            document.getElementById('confirmarSenha').focus();
            return;
        }

        // Validação de ponto para MASTER
        if (isMaster && !nomePonto) {
            if (messageDiv) messageDiv.innerHTML = '<div class="error-message">⚠️ Digite o nome do ponto de táxi.</div>';
            document.getElementById('nomePonto').focus();
            return;
        }

        // Disable button while saving
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = "⏳ Salvando...";
        }

        try {
            // Prepare update object
            const updates = isMaster
                ? { senha: novaSenha, primeiroLoginMaster: false, ponto: nomePonto }
                : { senha: novaSenha, primeiroLogin: false };

            // Update user in Firebase
            await db.ref(`usuarios/${user}`).update(updates);

            // Se for MASTER, criar o ponto no Firebase
            if (isMaster && nomePonto) {
                const pontoId = nomePonto.toLowerCase().replace(/\s+/g, '_');
                
                // Salvar no localStorage para que o app.js reconheça imediatamente
                localStorage.setItem('driverflux_ponto_atual', nomePonto);
                localStorage.setItem('driverflux_ponto_id', pontoId);
                localStorage.setItem('driverflux_ponto_nome', nomePonto);

                await db.ref(`pontos/${pontoId}`).set({
                    nome: nomePonto,
                    master: user,
                    criadoEm: new Date().toISOString()
                });

                // Atualizar o usuário master com o ponto e pontoId
                await db.ref(`usuarios/${user}`).update({
                    ponto: nomePonto,
                    pontoId: pontoId
                });
            }

            // Clear temp data
            localStorage.removeItem('driverflux_temp_user');
            localStorage.removeItem('driverflux_temp_isMaster');

            // Show success message
            if (messageDiv) {
                messageDiv.innerHTML = '<div class="success-message">✅ Senha alterada com sucesso! Redirecionando para o login...</div>';
            }

            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);

        } catch (error) {
            console.error('Erro ao salvar senha:', error);
            if (messageDiv) {
                messageDiv.innerHTML = '<div class="error-message">❌ Erro ao salvar senha: ' + (error.message || 'Tente novamente') + '</div>';
            }
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = "✅ Salvar e continuar";
            }
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            trocarSenha();
        }
    });
</script>
</body>
</html>
