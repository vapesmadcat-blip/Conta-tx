<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriverFlux - Controle Financeiro</title>
    <style>
        :root {
            --bg-principal: #f4f6f9;
            --card-bg: #ffffff;
            --texto: #2d3748;
            --texto-secundario: #718096;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 14px;
            color: var(--texto-secundario);
            margin-top: 4px;
        }

        .btn-group-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        .btn-success { background: var(--success); color: white; grid-column: span 2; }
        
        .btn-warning { background: var(--warning); color: white; padding: 8px 14px; font-size: 13px; border-radius: 8px; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--texto);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px;
            font-size: 12px;
            color: var(--texto-secundario);
            border-bottom: 2px solid #edf2f7;
            text-transform: uppercase;
        }

        td {
            padding: 14px 10px;
            font-size: 14px;
            border-bottom: 1px solid #edf2f7;
        }

        .row-id { font-weight: bold; color: var(--texto-secundario); }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .result-row.total-final {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed #e2e8f0;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }

        .danger-text { color: var(--danger); font-weight: 600; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            animation: scaleUp 0.2s ease-out;
        }

        @keyframes scaleUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h3 { margin-bottom: 16px; font-size: 18px; }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--texto-secundario);
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel { background: #e2e8f0; color: var(--texto); width: 40%; }

        .report-output {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.5;
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>DriverFlux</h1>
        <p>Gestão Inteligente de Corridas e Auxílios</p>
    </header>

    <div class="btn-group-main">
        <button class="btn-primary" onclick="abrirModalInsercao()">➕ Adicionar</button>
        <button class="btn-primary" style="background: #6366f1;" onclick="calcularTotais()">📊 Totalizador</button>
        <button class="btn-success" onclick="gerarRelatorio()">📄 Mostrar Relatório</button>
    </div>

    <div class="card">
        <h2>Lançamentos Atuais</h2>
        <div class="table-wrapper">
            <table id="tabelaDados">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Empréstimo</th>
                        <th>Corrida</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="card" id="cardTotais" style="display: none;">
        <h2>Resumo Calculado</h2>
        <div class="result-row"><span>Empréstimos Brutos:</span> <span id="totBruto">R$ 0,00</span></div>
        <div class="result-row"><span>Taxa Adicional (+20%):</span> <span id="totAcrescimo" class="danger-text">+ R$ 0,00</span></div>
        <div class="result-row"><span>Total Corridas:</span> <span id="totCorridas">R$ 0,00</span></div>
        <div class="result-row total-final"><span>Total Geral a Receber:</span> <span id="totGeral">R$ 0,00</span></div>
    </div>

    <div class="card" id="cardRelatorio" style="display: none;">
        <h2>Relatório de Exportação</h2>
        <div class="report-output" id="reportOutput"></div>
        <button class="btn-success" style="margin-top:15px; width:100%;" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
    </div>
</div>

<div class="modal" id="formModal">
    <div class="modal-content">
        <h3 id="modalTitle">Novo Lançamento</h3>
        <input type="hidden" id="editId">
        
        <div class="input-group">
            <label for="inputEmprestimo">Dinheiro Emprestado (R$)</label>
            <input type="number" step="0.01" id="inputEmprestimo" placeholder="0,00">
        </div>

        <div class="input-group">
            <label for="inputCorrida">Valor da Corrida (R$)</label>
            <input type="number" step="0.01" id="inputCorrida" placeholder="0,00">
        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="fecharModal()">Voltar</button>
            <button class="btn-primary" style="flex: 1;" onclick="salvarDados()">Confirmar</button>
        </div>
    </div>
</div>

<script>
    let registros = [];
    let contadorId = 1;

    function formatarMoeda(v) {
        return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function abrirModalInsercao() {
        document.getElementById('modalTitle').innerText = "Novo Lançamento";
        document.getElementById('editId').value = "";
        document.getElementById('inputEmprestimo').value = "";
        document.getElementById('inputCorrida').value = "";
        document.getElementById('formModal').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('formModal').style.display = 'none';
    }

    function abrirModalEdicao(id) {
        const reg = registros.find(r => r.id === id);
        if (!reg) return;

        document.getElementById('modalTitle').innerText = `Editar Registro #${id}`;
        document.getElementById('editId').value = id;
        document.getElementById('inputEmprestimo').value = reg.emprestado;
        document.getElementById('inputCorrida').value = reg.corrida;
        document.getElementById('formModal').style.display = 'flex';
    }

    function salvarDados() {
        const idEdit = document.getElementById('editId').value;
        const vEmprestimo = parseFloat(document.getElementById('inputEmprestimo').value) || 0;
        const vCorrida = parseFloat(document.getElementById('inputCorrida').value) || 0;

        // Captura data e hora atuais para o registro
        const agora = new Date();
        const dataHoraStr = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

        if (idEdit) {
            const reg = registros.find(r => r.id === parseInt(idEdit));
            if (reg) {
                reg.emprestado = vEmprestimo;
                reg.corrida = vCorrida;
                reg.dataHora = dataHoraStr;
            }
        } else {
            registros.push({ id: contadorId++, emprestado: vEmprestimo, corrida: vCorrida, dataHora: dataHoraStr });
        }

        fecharModal();
        renderizarTabela();
        resetarPaineis();
    }

    function renderizarTabela() {
        const tbody = document.querySelector('#tabelaDados tbody');
        tbody.innerHTML = '';

        registros.forEach(reg => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="row-id">#${reg.id}</td>
                <td>${formatarMoeda(reg.emprestado)}</td>
                <td>${formatarMoeda(reg.corrida)}</td>
                <td><button class="btn-warning" onclick="abrirModalEdicao(${reg.id})">Editar</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function resetarPaineis() {
        document.getElementById('cardTotais').style.display = 'none';
        document.getElementById('cardRelatorio').style.display = 'none';
    }

    function calcularTotais() {
        let tBruto = 0, tCorridas = 0;
        registros.forEach(r => { tBruto += r.emprestado; tCorridas += r.corrida; });

        let juros = tBruto * 0.20;
        let tGeral = tBruto + juros + tCorridas;

        document.getElementById('totBruto').innerText = formatarMoeda(tBruto);
        document.getElementById('totAcrescimo').innerText = `+ ${formatarMoeda(juros)}`;
        document.getElementById('totCorridas').innerText = formatarMoeda(tCorridas);
        document.getElementById('totGeral').innerText = formatarMoeda(tGeral);

        document.getElementById('cardTotais').style.display = 'block';
    }

    function gerarRelatorio() {
        if (registros.length === 0) return alert("Adicione dados primeiro!");

        let tBruto = 0, tCorridas = 0;
        let txt = `🧾 DRIVERFLUX - RELATÓRIO DETALHADO\n`;
        txt += `Emitido em: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}\n`;
        txt += `=========================================\n\n`;

        registros.forEach(r => {
            tBruto += r.emprestado; tCorridas += r.corrida;
            txt += `[${r.dataHora}] Reg #${r.id}\n`;
            txt += `  -> Empréstimo: ${formatarMoeda(r.emprestado)}\n`;
            txt += `  -> Corrida:    ${formatarMoeda(r.corrida)}\n`;
            txt += `-----------------------------------------\n`;
        });

        let juros = tBruto * 0.20;
        let tGeral = tBruto + juros + tCorridas;

        txt += `\n=========================================\n`;
        txt += `Subtotal Empréstimos:    ${formatarMoeda(tBruto)}\n`;
        txt += `Taxa Adicional (+20%):   ${formatarMoeda(juros)}\n`;
        txt += `Subtotal Corridas:       ${formatarMoeda(tCorridas)}\n`;
        txt += `-----------------------------------------\n`;
        txt += `VALOR TOTAL A RECEBER:   ${formatarMoeda(tGeral)}\n`;
        txt += `=========================================`;

        document.getElementById('reportOutput').innerText = txt;
        document.getElementById('reportOutput').style.display = 'block';
        document.getElementById('cardRelatorio').style.display = 'block';
    }
</script>
</body>
</html>
